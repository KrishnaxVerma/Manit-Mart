        function log(msg) {
            const l = document.getElementById('logs');
            l.innerHTML += `<div>> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function seedData() {
            const status = document.getElementById('status');
            status.className = "status info";
            status.textContent = "Seeding...";
            
            try {
                // Seed Users
                for (const u of dummyUsers) {
                    await db.collection('users').doc(u.uid).set(u);
                    log(`User created: ${u.name}`);
                }

                // Seed Products
                for (const p of dummyProducts) {
                    await db.collection('products').add(p);
                    log(`Product added: ${p.title}`);
                }

                status.className = "status success";
                status.textContent = "Successfully Seeded!";
            } catch (err) {
                status.className = "status error";
                status.textContent = err.message;
            }
        }

        async function clearData() {
            if(!confirm("Clear all?")) return;
            const status = document.getElementById('status');
            status.textContent = "Clearing...";
            
            try {
                const p = await db.collection('products').get();
                p.forEach(d => d.ref.delete());
                log("All products deleted");
                
                status.className = "status success";
                status.textContent = "Database Cleared";
            } catch (err) {
                status.className = "status error";
                status.textContent = err.message;
            }
        }
